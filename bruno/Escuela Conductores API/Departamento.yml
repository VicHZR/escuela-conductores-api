info:
  name: Departamento
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/departamentos"
  body:
    type: json
    data: |-
      {
        "nombre": "CUSCO"
      }
  auth: inherit

runtime:
  variables:
    - name: url
      value: |
        http://localhost:8081

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
